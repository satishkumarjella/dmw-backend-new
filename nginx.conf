events { 
    worker_connections 1024; 
}

http {
    upstream dmw_api_backend {
        # For host-level nginx proxying to the scaled Docker Compose services,
        # use the exposed host ports for the api containers.
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;
    }

    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass http://dmw_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Allow larger file uploads (adjust size as needed)
            client_max_body_size 100M;
        }
    }
}