name: Build and Deploy Backend

on:
  push:
    branches:
      - master # Trigger on pushes to the main branch
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your target Node.js version
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/,package.json,package-lock.json"
          target: "/var/www/html/server/dmw-backend-new"  # Updated to your path
          overwrite: true

      - name: Install Prod Dependencies & Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/html/server/dmw-backend-new  # Updated to your path
            npm install --omit=dev
            pm2 delete all || true
            pm2 start dist/main.js --name "dmw-backend"
            echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S systemctl restart nginx