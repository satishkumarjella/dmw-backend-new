- name: Copy files to server
  uses: appleboy/scp-action@v0.1.7
  with:
    host: ${{ secrets.SERVER_HOST }}
    username: ${{ secrets.SERVER_USERNAME }}
    password: ${{ secrets.SERVER_PASSWORD }}
    source: "dist/,package.json,package-lock.json"
    target: ${{ secrets.SERVER_TARGET_DIR }}
    overwrite: true

- name: Install Prod Dependencies & Restart Server
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.SERVER_HOST }}
    username: ${{ secrets.SERVER_USERNAME }}
    password: ${{ secrets.SERVER_PASSWORD }}
    script: |
      cd ${{ secrets.SERVER_TARGET_DIR }}
      npm install --omit=dev
      pm2 delete all || true
      pm2 start dist/main.js --name "dmw-backend"
      echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S systemctl restart nginx