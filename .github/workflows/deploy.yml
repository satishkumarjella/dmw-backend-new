name: Build and Deploy Backend

on:
  push:
    branches:
      - dev
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your target Node.js version
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ github.ref_name == 'dev' && secrets.SERVER_HOST || secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/,.env/,package.json,package-lock.json,Dockerfile,docker-compose.yml"
          target: "/var/www/html/server/dmw-backend-new"
          overwrite: true

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.ref_name == 'dev' && secrets.SERVER_HOST || secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/html/server/dmw-backend-new
            if [ "${{ github.ref_name }}" = "dev" ]; then
              echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S docker compose -f docker-compose.yml up --build -d
            else
              echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S docker compose -f docker-compose.prod.yml up --build --scale api=3 -d
              echo '${{ secrets.SERVER_PASSWORD }}' | sudo -S systemctl restart nginx
            fi