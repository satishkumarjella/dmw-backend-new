upstream dmw_api_backend {
    server 172.17.0.1:3001;
    server 172.17.0.1:3002;
    server 172.17.0.1:3003;
}

server {
    listen 80;
    server_name 172.190.109.60;

    # Serve Angular static files
    root /usr/share/nginx/html;
    index index.html;

    # Handle Angular routing (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to NestJS Docker containers
    location /api/ {
        proxy_pass http://dmw_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Allow larger file uploads (adjust size as needed)
        client_max_body_size 100M;
    }

    # Optional: Handle Angular assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
