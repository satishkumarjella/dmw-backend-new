upstream dmw_api_backend {
    server api:3000;
}

server {
    listen 80;
    server_name localhost;

    # Remove root directive since this is a backend API proxy
    # Only needed if serving frontend files

    location ^~ /api/ {
        proxy_pass http://dmw_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 100M;
    }

    # If you need to serve static files, add location blocks here
}